# ==============================================================================================================================
# ruff config
# ==============================================================================================================================
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

line-length = 128
indent-width = 4

target-version = "py313"

[lint]
select = ["ALL"]
ignore = [
    "COM812",
    "COM819",
    "D100",
    "D203",
    "D213",
    "D300",
    "E111",
    "E114",
    "E117",
    "EXE003",
    "ISC001",
    "ISC002",
    "Q000",
    "Q001",
    "Q002",
    "Q003",
    "W191",
]

fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[lint.isort]
force-sort-within-sections = true
case-sensitive = false
combine-as-imports = true
split-on-trailing-comma = false
lines-after-imports = 2

# Add your top-level project module names here so isort sorts them as
# first-party imports rather than third-party. Example:
#   known-first-party = ["my_lib", "my_app"]
known-first-party = []

section-order = ["future", "standard-library", "third-party", "first-party", "testing"]

[lint.isort.sections]
testing = ["pytest*", "tests*"]

[lint.per-file-ignores]
# Test file relaxed standards
"**/tests/**.py" = ["INP001", "S101", "ARG", "FBT", "PLR2004", "S105", "S106", "SLF001"]
# pytest configuration files
"**/conftest.py" = ["INP001"]
# Script file relaxed standards
"**/scripts/**/*.py" = ["T201", "EXE001"]
