# ==============================================================================================================================
# Lint
# ==============================================================================================================================
# Automated linting report for GitHub pull requests.
#
# Runs linting and formatting checks on modified files,
# provides feedback directly in PR comments.
#
# Uses smart file detection to only run relevant linters based on the types of
# files changed. Each linter runs as a separate job for parallel execution.
#
# SUPPORTED FILE TYPES:
# - Python (.py)     -> ruff
# - Markdown (.md)   -> markdownlint
# - YAML (.yml/.yaml)-> yamllint
# - JSON (.json)     -> prettier
# - TOML (.toml)     -> prettier
# - Shell (.sh/.bash)-> shellcheck
# - git commits      -> commitlint
# - secrets          -> gitleaks
#
# CONFIGURATION FILES:
# - ruff.toml          -> ruff configuration (Python linting rules)
# - .markdownlint.yml  -> markdownlint rules and exceptions
# - .yamllint.yml      -> YAML linting rules and formatting preferences
# - .prettierrc.cjs    -> prettier formatting configuration
# - .commitlintrc.cjs  -> git commit messages
# ==============================================================================================================================
---
name: Code Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight runs on the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # GitHub PR comment body limit
  MAX_COMMENT_LENGTH: 65536

jobs:
  # ============================================================================================================================
  # Validate PR Title
  # ============================================================================================================================
  validate_pr_title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            build
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character.

  # ============================================================================================================================
  # Ruff (Python Linting)
  # ============================================================================================================================
  ruff:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed Python files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **.py

      - name: Install uv
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uv sync

      - name: Run ruff
        id: ruff
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Changed Python files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

          if uv run ruff check \
              ${{ steps.changed-files.outputs.all_changed_files }} \
              > ruff_output.txt 2>&1; then
            echo "ruff_status=success" >> $GITHUB_OUTPUT
            echo "ruff check passed"
          else
            echo "ruff_status=failure" >> $GITHUB_OUTPUT
            echo "ruff check failed"
            cat ruff_output.txt
            exit 1
          fi

      - name: Comment PR with ruff results
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- ruff-report -->';

            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}';
            const files = changedFiles.split(' ').filter(f => f.trim() !== '');
            const anyChanged = '${{ steps.changed-files.outputs.any_changed }}';

            // If no files to check, delete existing comment if present
            if (files.length === 0 || anyChanged !== 'true') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(
                c => c.body.includes(commentMarker)
              );

              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id
                });
              }
              return;
            }

            let ruffOutput = '';
            let status = '${{ steps.ruff.outputs.ruff_status }}';

            try {
              ruffOutput = fs.readFileSync('ruff_output.txt', 'utf8');
              ruffOutput = ruffOutput.replace(/\x1b\[[0-9;]*m/g, '');
            } catch (error) {
              ruffOutput = 'No output file generated';
            }

            let comment = commentMarker + '\n';

            if (status === 'success') {
              comment += `## ✅ Ruff Check Passed\n\n`;
              comment += `All Python files passed linting.\n\n`;
              comment += `**Files checked:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
            } else if (status === 'failure') {
              comment += `## ❌ Ruff Check Failed\n\n`;
              comment += `**Files with linting issues:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
              comment += `\n**Linting output:**\n\n`;
              comment += '```\n' + ruffOutput + '\n```\n\n';
              comment += `Please fix these linting issues.\n`;
            }

            const maxLen = ${{ env.MAX_COMMENT_LENGTH }};
            if (comment.length > maxLen) {
              const msg = '\n\n---\n*Truncated: comment size limit.*\n';
              comment = comment.substring(0, maxLen - msg.length) + msg;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  # ============================================================================================================================
  # Markdownlint
  # ============================================================================================================================
  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed Markdown files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **.md
          files_ignore: |
            CHANGELOG.md

      - name: Set up Node.js
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npm install --save-dev markdownlint-cli2

      - name: Run markdownlint
        id: markdownlint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Running markdownlint on changed files..."
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

          if npx markdownlint-cli2 \
              --config .markdownlint.yml \
              ${{ steps.changed-files.outputs.all_changed_files }} \
              > markdownlint_output.txt 2>&1; then
            echo "markdownlint_status=success" >> $GITHUB_OUTPUT
          else
            echo "markdownlint_status=failure" >> $GITHUB_OUTPUT
            cat markdownlint_output.txt
          fi
        continue-on-error: true

      - name: Comment PR with markdownlint results
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- markdownlint-report -->';
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}';
            const files = changedFiles.split(' ').filter(f => f.trim() !== '');
            const anyChanged = '${{ steps.changed-files.outputs.any_changed }}';

            if (files.length === 0 || anyChanged !== 'true') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(
                c => c.body.includes(commentMarker)
              );

              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id
                });
              }
              return;
            }

            const status = '${{ steps.markdownlint.outputs.markdownlint_status }}';

            let markdownlintOutput = '';
            try {
              markdownlintOutput = fs.readFileSync('markdownlint_output.txt', 'utf8');
            } catch (error) {
              markdownlintOutput = 'No output file generated';
            }

            let comment = commentMarker + '\n';

            if (status === 'success') {
              comment += `## ✅ Markdownlint Check Passed\n\n`;
              comment += `All Markdown files passed linting.\n\n`;
              comment += `**Files checked:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
            } else {
              comment += `## ❌ Markdownlint Check Failed\n\n`;
              comment += `**Files with linting issues:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
              comment += `\n**Linting errors:**\n\n`;
              comment += '```\n' + markdownlintOutput + '\n```\n\n';
              comment += `Run \`npx markdownlint-cli2 --fix\` to auto-fix issues.\n`;
            }

            const maxLen = ${{ env.MAX_COMMENT_LENGTH }};
            if (comment.length > maxLen) {
              const msg = '\n\n---\n*Truncated: comment size limit.*\n';
              comment = comment.substring(0, maxLen - msg.length) + msg;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Fail if markdownlint failed
        if: steps.markdownlint.outputs.markdownlint_status == 'failure'
        run: exit 1

  # ============================================================================================================================
  # Yamllint
  # ============================================================================================================================
  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed YAML files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **.yml
            **.yaml

      - name: Install uv
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install yamllint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          uv tool install yamllint
          uv tool update-shell

      - name: Run yamllint
        id: yamllint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if uv tool run yamllint -f parsable -c .yamllint.yml \
              ${{ steps.changed-files.outputs.all_changed_files }} \
              > yamllint_output.txt 2>&1; then
            echo "yamllint_status=success" >> $GITHUB_OUTPUT
          else
            echo "yamllint_status=failure" >> $GITHUB_OUTPUT
            cat yamllint_output.txt
          fi
        continue-on-error: true

      - name: Comment PR with yamllint results
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- yamllint-report -->';
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}';
            const files = changedFiles.split(' ').filter(f => f.trim() !== '');
            const anyChanged = '${{ steps.changed-files.outputs.any_changed }}';

            if (files.length === 0 || anyChanged !== 'true') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(
                c => c.body.includes(commentMarker)
              );

              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id
                });
              }
              return;
            }

            let yamllintOutput = '';
            const status = '${{ steps.yamllint.outputs.yamllint_status }}';

            try {
              yamllintOutput = fs.readFileSync('yamllint_output.txt', 'utf8');
            } catch (error) {
              yamllintOutput = 'No output file generated';
            }

            let comment = commentMarker + '\n';

            if (status === 'success') {
              comment += `## ✅ Yamllint Check Passed\n\n`;
              comment += `All YAML files passed linting.\n\n`;
              comment += `**Files checked:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
            } else {
              comment += `## ❌ Yamllint Check Failed\n\n`;
              comment += `**Linting errors:**\n\n`;
              comment += '```\n' + yamllintOutput + '\n```\n\n';
              comment += `Run \`yamllint -c .yamllint.yml <file>\` to check specific files.\n`;
            }

            const maxLen = ${{ env.MAX_COMMENT_LENGTH }};
            if (comment.length > maxLen) {
              const msg = '\n\n---\n*Truncated: comment size limit.*\n';
              comment = comment.substring(0, maxLen - msg.length) + msg;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Fail if yamllint failed
        if: steps.yamllint.outputs.yamllint_status == 'failure'
        run: exit 1

  # ============================================================================================================================
  # Prettier (JSON/TOML Formatting)
  # ============================================================================================================================
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **.json
            **.toml

      - name: Set up Node.js
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install prettier
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          npm install --save-dev prettier prettier-plugin-toml

      - name: Run prettier
        id: prettier
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if npx prettier --check \
              ${{ steps.changed-files.outputs.all_changed_files }} \
              > prettier_output_raw.txt 2>&1; then
            echo "prettier_status=success" >> $GITHUB_OUTPUT
          else
            echo "prettier_status=failure" >> $GITHUB_OUTPUT
          fi
          sed 's/\x1b\[[0-9;]*m//g' prettier_output_raw.txt > prettier_output.txt
          cat prettier_output.txt
        continue-on-error: true

      - name: Comment PR with prettier results
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- prettier-report -->';
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}';
            const files = changedFiles.split(' ').filter(f => f.trim() !== '');
            const anyChanged = '${{ steps.changed-files.outputs.any_changed }}';

            if (files.length === 0 || anyChanged !== 'true') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(
                c => c.body.includes(commentMarker)
              );

              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id
                });
              }
              return;
            }

            let prettierOutput = '';
            const status = '${{ steps.prettier.outputs.prettier_status }}';

            try {
              prettierOutput = fs.readFileSync('prettier_output.txt', 'utf8');
              prettierOutput = prettierOutput.replace(/\x1b\[[0-9;]*m/g, '');
            } catch (error) {
              prettierOutput = 'No output file generated';
            }

            let comment = commentMarker + '\n';

            if (status === 'success') {
              comment += `## ✅ Prettier Check Passed\n\n`;
              comment += `All files are properly formatted.\n\n`;
              comment += `**Files checked:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
            } else if (status === 'failure') {
              comment += `## ❌ Prettier Check Failed\n\n`;
              comment += `**Files needing formatting:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
              comment += `\n**Formatting output:**\n\n`;
              comment += '```\n' + prettierOutput + '\n```\n\n';
              comment += `Run \`npx prettier --write .\` to fix formatting.\n`;
            }

            const maxLen = ${{ env.MAX_COMMENT_LENGTH }};
            if (comment.length > maxLen) {
              const msg = '\n\n---\n*Truncated: comment size limit.*\n';
              comment = comment.substring(0, maxLen - msg.length) + msg;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Fail if prettier failed
        if: steps.prettier.outputs.prettier_status == 'failure'
        run: exit 1

  # ============================================================================================================================
  # Shellcheck (Shell Script Linting)
  # ============================================================================================================================
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed shell files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **.sh
            **.bash

      - name: Install shellcheck
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        id: shellcheck
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if shellcheck -x \
              ${{ steps.changed-files.outputs.all_changed_files }} \
              > shellcheck_output.txt 2>&1; then
            echo "shellcheck_status=success" >> $GITHUB_OUTPUT
          else
            echo "shellcheck_status=failure" >> $GITHUB_OUTPUT
            cat shellcheck_output.txt
          fi
        continue-on-error: true

      - name: Comment PR with shellcheck results
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- shellcheck-report -->';
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}';
            const files = changedFiles.split(' ').filter(f => f.trim() !== '');
            const anyChanged = '${{ steps.changed-files.outputs.any_changed }}';

            if (files.length === 0 || anyChanged !== 'true') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(
                c => c.body.includes(commentMarker)
              );

              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id
                });
              }
              return;
            }

            let shellcheckOutput = '';
            const status = '${{ steps.shellcheck.outputs.shellcheck_status }}';

            try {
              shellcheckOutput = fs.readFileSync('shellcheck_output.txt', 'utf8');
            } catch (error) {
              shellcheckOutput = 'No output file generated';
            }

            let comment = commentMarker + '\n';

            if (status === 'success') {
              comment += `## ✅ Shellcheck Passed\n\n`;
              comment += `All shell scripts passed linting.\n\n`;
              comment += `**Files checked:**\n`;
              files.forEach(file => {
                comment += `- \`${file}\`\n`;
              });
            } else {
              comment += `## ❌ Shellcheck Failed\n\n`;
              comment += `**Linting errors:**\n\n`;
              comment += '```\n' + shellcheckOutput + '\n```\n\n';
              comment += `Run \`shellcheck <file>\` to check specific files.\n`;
            }

            const maxLen = ${{ env.MAX_COMMENT_LENGTH }};
            if (comment.length > maxLen) {
              const msg = '\n\n---\n*Truncated: comment size limit.*\n';
              comment = comment.substring(0, maxLen - msg.length) + msg;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Fail if shellcheck failed
        if: steps.shellcheck.outputs.shellcheck_status == 'failure'
        run: exit 1

  # ============================================================================================================================
  # GitLeaks (Secrets Detection)
  # ============================================================================================================================
  gitleaks:
    name: GitLeaks (Secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gitleaks
        run: |
          version="8.18.2"
          base_url="https://github.com/gitleaks/gitleaks/releases/download"
          curl -L -o gitleaks.tar.gz \
            ${base_url}/v${version}/gitleaks_${version}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks
        id: gitleaks
        run: |
          rm -f gitleaks_output*.txt gitleaks-report.json
          if gitleaks detect --verbose \
              --log-opts="origin/${{ github.base_ref }}..HEAD" \
              --report-path=gitleaks-report.json \
              > gitleaks_output_full.txt 2>&1; then
            echo "gitleaks_status=success" >> $GITHUB_OUTPUT
          else
            echo "gitleaks_status=failure" >> $GITHUB_OUTPUT
            cat gitleaks_output_full.txt
          fi
          head -c 50000 gitleaks_output_full.txt > gitleaks_output.txt 2>/dev/null || \
            touch gitleaks_output.txt
          if [ -f gitleaks_output_full.txt ] && \
             [ $(wc -c < gitleaks_output_full.txt) -gt 50000 ]; then
            echo "" >> gitleaks_output.txt
            echo "... (output truncated due to size)" >> gitleaks_output.txt
          fi
        continue-on-error: true

      - name: Comment PR with gitleaks results
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- gitleaks-report -->';
            const status = '${{ steps.gitleaks.outputs.gitleaks_status }}';

            let gitleaksOutput = '';
            try {
              gitleaksOutput = fs.readFileSync('gitleaks_output.txt', 'utf8');
              gitleaksOutput = gitleaksOutput.replace(/\x1b\[[0-9;]*m/g, '');
            } catch (error) {
              gitleaksOutput = 'No output file generated';
            }

            let comment = commentMarker + '\n';

            if (status === 'success') {
              comment += `## ✅ GitLeaks Check Passed\n\n`;
              comment += `No secrets or sensitive data detected.\n\n`;
              comment += `**Scanned commits:** \`origin/${{ github.base_ref }}..HEAD\`\n`;
            } else {
              comment += `## ❌ GitLeaks Check Failed\n\n`;
              comment += `**Potential secrets or sensitive data detected!**\n\n`;
              comment += `**Detection output:**\n\n`;
              comment += '```\n' + gitleaksOutput + '\n```\n\n';
              comment += `⚠️ Do not commit secrets, API keys, passwords, or sensitive data.\n`;
            }

            const maxLen = ${{ env.MAX_COMMENT_LENGTH }};
            if (comment.length > maxLen) {
              const msg = '\n\n---\n*Truncated: comment size limit.*\n';
              comment = comment.substring(0, maxLen - msg.length) + msg;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Fail if gitleaks failed
        if: steps.gitleaks.outputs.gitleaks_status == 'failure'
        run: exit 1

  # ============================================================================================================================
  # Commitlint (Commit Message Linting)
  # ============================================================================================================================
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: |
          npm install --save-dev \
            @commitlint/cli \
            @commitlint/config-conventional

      - name: Get branch commits
        id: branch-commits
        run: |
          base_ref="origin/${{ github.base_ref }}"
          commits=$(git log --format="%H" $base_ref..HEAD)
          if [ -z "$commits" ]; then
            echo "has_commits=false" >> $GITHUB_OUTPUT
          else
            echo "has_commits=true" >> $GITHUB_OUTPUT
            echo "$commits" > branch_commits.txt
          fi

      - name: Lint commit messages
        id: commitlint
        if: steps.branch-commits.outputs.has_commits == 'true'
        run: |
          all_passed=true
          output_file="commitlint_output.txt"
          > "$output_file"
          while read -r commit; do
            echo "Checking commit: $commit" | tee -a "$output_file"
            commit_msg=$(git log --format=%B -n 1 "$commit")
            if echo "$commit_msg" | \
               npx commitlint --config .commitlintrc.cjs \
               >> "$output_file" 2>&1; then
              echo "✅ Passed" | tee -a "$output_file"
            else
              echo "❌ Failed" | tee -a "$output_file"
              all_passed=false
            fi
            echo "" | tee -a "$output_file"
          done < branch_commits.txt
          if [ "$all_passed" = true ]; then
            echo "commitlint_status=success" >> $GITHUB_OUTPUT
          else
            echo "commitlint_status=failure" >> $GITHUB_OUTPUT
            cat "$output_file"
            exit 1
          fi

      - name: Comment PR with commitlint results
        if: |
          always() &&
          steps.branch-commits.outputs.has_commits == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- commitlint-report -->';

            let commitlintOutput = '';
            const status = '${{ steps.commitlint.outputs.commitlint_status }}';

            try {
              commitlintOutput = fs.readFileSync('commitlint_output.txt', 'utf8');
              commitlintOutput = commitlintOutput.replace(/\x1b\[[0-9;]*m/g, '');
            } catch (error) {
              commitlintOutput = 'No output file generated';
            }

            const commits = fs.readFileSync('branch_commits.txt', 'utf8')
              .trim().split('\n');
            const commitCount = commits.length;

            let comment = commentMarker + '\n';

            if (status === 'success') {
              comment += `## ✅ Commitlint Passed\n\n`;
              comment += `All ${commitCount} commit message(s) follow conventional commit format.\n`;
            } else if (status === 'failure') {
              comment += `## ❌ Commitlint Failed\n\n`;
              comment += `Some commit messages do not follow conventional commit format.\n\n`;
              comment += `**Linting output:**\n\n`;
              comment += '```\n' + commitlintOutput + '\n```\n\n';
              comment += `Format: \`<type>[optional scope]: <description>\`\n\n`;
              comment += `Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, build\n`;
            }

            const maxLen = ${{ env.MAX_COMMENT_LENGTH }};
            if (comment.length > maxLen) {
              const msg = '\n\n---\n*Truncated: comment size limit.*\n';
              comment = comment.substring(0, maxLen - msg.length) + msg;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c => c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
